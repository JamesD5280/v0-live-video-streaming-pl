# COEXISTENCE WITH NIMBLE STREAMER:
# This container uses host networking to avoid Docker iptables rules
# that can interfere with Nimble Streamer's RTMP port (1935).
# 2MStream API listens on port 3001 (no conflict with Nimble's 1935).
# 
# If port 3001 conflicts with anything, change the PORT env var below.
services:
  streaming-engine:
    build: .
    network_mode: "host"
    environment:
      - PORT=3001
      - API_SECRET=${API_SECRET}
      - VIDEO_DIR=/app/videos
    volumes:
      - ./videos:/app/videos
    restart: unless-stopped
